name = "vue-idle-xiuxian"
compatibility_date = "2024-09-01"
pages_build_output_dir = "docs"

# 账号 / 云存档 / GM 礼包 所需的 D1 数据库绑定
# 首次部署前请执行：
#   wrangler d1 create xiuxian
# 并把返回的 database_id 填到下方 database_id。
[[d1_databases]]
binding = "DB"
database_name = "xiuxian"
database_id = "db5eb216-6195-4d7f-8e02-9cae689b39d8"

# JWT 签名密钥。生产环境请用 wrangler secret put JWT_SECRET 覆盖，勿在此写真实密钥。
[vars]
JWT_SECRET = "change-me-in-production"
